<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>G2 Apartments</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f3f4f6;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      max-width: 1000px;
      width: 90%;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 32px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 16px;
    }

    .card h2 {
      margin: 0;
      font-size: 20px;
    }

    .card p {
      font-size: 14px;
      color: #6b7280;
      margin: 8px 0 12px;
    }

    .btn {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #07152f;
      color: white;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome to G2 Apartments</h1>

    <div class="cards">
      <div class="card">
        <img src="Images/living-room.jpg" />
        <div class="card-content">
          <h2>G2 Luxe</h2>
          <p>Victoria Island · 2 Bedroom Luxury</p>
          <a href="apt1.html" class="btn">View Apartment</a>
        </div>
      </div>

      <div class="card">
        <img src="Images/apt2/living-room.jpg" />
        <div class="card-content">
          <h2>G2 Residence</h2>
          <p>Ikeja · Cozy Premium Stay</p>
          <a href="apt2.html" class="btn">View Apartment</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
